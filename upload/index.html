<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYDRASKRIPT - AI & Human Collaboration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        canvas { display: block; }
        #info {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 12px;
            z-index: 100;
        }
        .particle {
            position: absolute;
            background: rgba(100, 200, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div id="info">HYDRASKRIPT - AI & Human Synergy | Drag to Rotate</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({
            canvas: document.getElementById('bg'),
            antialias: true,
            alpha: true
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.35;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // Camera position
        camera.position.set(0, 0, 8);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight1 = new THREE.DirectionalLight(0x4040ff, 1);
        directionalLight1.position.set(5, 5, 5);
        scene.add(directionalLight1);

        const directionalLight2 = new THREE.DirectionalLight(0xff4080, 0.8);
        directionalLight2.position.set(-5, -5, 5);
        scene.add(directionalLight2);

        const pointLight = new THREE.PointLight(0xffffff, 1, 10);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        // Create chrome material
        const chromeMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 1.0,
            roughness: 0.1,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            reflectivity: 1.0,
            envMapIntensity: 2.0
        });

        // Create environment map for reflections
        const envMap = new THREE.CubeTextureLoader()
            .setPath('https://threejs.org/examples/textures/cube/')
            .load(['px.jpg', 'nx.jpg', 'py.jpg', 'ny.jpg', 'pz.jpg', 'nz.jpg']);
        chromeMaterial.envMap = envMap;

        // Create text geometry
        const loader = new THREE.FontLoader();
        let textMesh;

        loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
            const textGeometry = new THREE.TextGeometry('HYDRASKRIPT', {
                font: font,
                size: 1.2,
                height: 0.5,
                curveSegments: 12,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.1,
                bevelOffset: 0,
                bevelSegments: 5
            });

            textGeometry.center();

            // Create edges for the text
            const edges = new THREE.EdgesGeometry(textGeometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x4040ff }));

            textMesh = new THREE.Mesh(textGeometry, chromeMaterial);
            textMesh.position.set(0, 0, 0);
            textMesh.castShadow = true;
            textMesh.receiveShadow = true;

            // Add glow effect
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x4040ff,
                transparent: true,
                opacity: 0.3
            });
            const glowMesh = new THREE.Mesh(textGeometry, glowMaterial);
            glowMesh.scale.multiplyScalar(1.02);
            glowMesh.position.copy(textMesh.position);

            const group = new THREE.Group();
            group.add(textMesh);
            group.add(glowMesh);
            group.add(line);

            scene.add(group);

            // Add particles around the text
            createParticles();
        });

        // Create floating particles
        function createParticles() {
            const particleCount = 150;
            const particles = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;

                // Position particles in a sphere around the text
                const radius = 3 + Math.random() * 2;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);

                // Colors - blue to cyan gradient
                const color = new THREE.Color();
                color.setHSL(0.6 + Math.random() * 0.1, 0.8, 0.5);
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;

                sizes[i] = 0.05 + Math.random() * 0.1;
            }

            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            particles.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });

            const particleSystem = new THREE.Points(particles, particleMaterial);
            scene.add(particleSystem);

            // Animate particles
            function animateParticles() {
                const positions = particles.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    // Slowly move particles in a circular motion
                    positions[i3 + 1] += Math.sin(Date.now() * 0.001 + i) * 0.005;
                }
                particles.attributes.position.needsUpdate = true;
            }

            // Add to animation loop
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                if (textMesh) textMesh.rotation.y += 0.002;
                animateParticles();
                renderer.render(scene, camera);
            }
            animate();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Add mouse move effect
        document.addEventListener('mousemove', (e) => {
            if (textMesh) {
                textMesh.rotation.x = (e.clientY / window.innerHeight - 0.5) * 0.2;
                textMesh.rotation.y = (e.clientX / window.innerWidth - 0.5) * 0.2;
            }
        });

        // Start animation
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
