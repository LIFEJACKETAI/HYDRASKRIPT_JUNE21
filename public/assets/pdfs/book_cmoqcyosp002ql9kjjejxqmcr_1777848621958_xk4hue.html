<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY FIRST COLORING BOOK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', 'Times New Roman', serif; background: #1a1a1a; color: #333; }
    
    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 20px auto;
      background: white;
      padding: 40px;
      page-break-after: always;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .cover-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: white;
    }
    
    .cover-image {
      max-width: 100%;
      max-height: 60%;
      object-fit: contain;
      border-radius: 8px;
    }
    
    .cover-title {
      font-size: 2.5em;
      margin-top: 30px;
      text-align: center;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .cover-genre {
      font-size: 1.2em;
      color: #999;
      margin-top: 10px;
    }
    
    .children-page {
      display: flex;
      flex-direction: column;
    }
    
    .illustration-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50%;
      padding-bottom: 10px;
    }
    
    .chapter-illustration {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }
    
    .text-section {
      flex: 1;
      padding-top: 10px;
      border-top: 2px solid #e5e5e5;
    }
    
    .coloring-page {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .coloring-illustration {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    
    .adult-page {
      line-height: 1.8;
    }
    
    .chapter-title {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #1a1a1a;
      border-bottom: 2px solid #a855f7;
      padding-bottom: 10px;
    }
    
    .chapter-content {
      font-size: 1.1em;
      line-height: 1.8;
      text-align: justify;
    }
    
    .chapter-content p {
      margin-bottom: 1em;
      text-indent: 1.5em;
    }
    
    .chapter-content p:first-child {
      text-indent: 0;
    }
    
    .page-number {
      position: absolute;
      bottom: 20px;
      right: 40px;
      font-size: 0.9em;
      color: #999;
    }
    
    @media print {
      .page { margin: 0; box-shadow: none; }
      body { background: white; }
    }
  </style>
</head>
<body>
  <div class="page cover-page">
         <img src="/assets/covers/cover_pixar_1777848591351_m327r3.png" alt="MY FIRST COLORING BOOK Cover" class="cover-image" />
         <h1 class="cover-title">MY FIRST COLORING BOOK</h1>
       </div>
  
        <div class="page coloring-page">
          <img src="/assets/illustrations/coloring_page_lineart_1777848367263_v0to60.png" alt="The Canvas of Self" class="coloring-illustration" />
          <div class="page-number">1</div>
        </div>
      

        <div class="page coloring-page">
          <img src="/assets/illustrations/coloring_page_lineart_1777848414242_67pjfj.png" alt="Shadows and Light" class="coloring-illustration" />
          <div class="page-number">2</div>
        </div>
      

        <div class="page coloring-page">
          <img src="/assets/illustrations/coloring_page_lineart_1777848453716_nzks6p.png" alt="The Architecture of Memory" class="coloring-illustration" />
          <div class="page-number">3</div>
        </div>
      

        <div class="page coloring-page">
          <img src="/assets/illustrations/coloring_page_lineart_1777848494729_ehkeyr.png" alt="The Alchemy of Emotion" class="coloring-illustration" />
          <div class="page-number">4</div>
        </div>
      

        <div class="page coloring-page">
          <img src="/assets/illustrations/coloring_page_lineart_1777848540955_1obex7.png" alt="The Unfinished Symphony" class="coloring-illustration" />
          <div class="page-number">5</div>
        </div>
      
</body>
</html>
