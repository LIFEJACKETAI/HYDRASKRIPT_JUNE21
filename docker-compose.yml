version: '3.8'
services:
  hydraskript:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    env_file:
      - .env
    restart: always
